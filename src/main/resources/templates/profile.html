<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${profile.name} + ' - Profile'">Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #12122a;
            --accent-gold: #c9956b;
            --accent-gold-light: #e8b88a;
            --accent-violet: #6c5ce7;
            --accent-violet-light: #a29bfe;
            --text-primary: #f0e6d3;
            --text-secondary: rgba(240, 230, 211, 0.6);
            --text-muted: rgba(240, 230, 211, 0.35);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.08);
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .bg-animated {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animated::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(108, 92, 231, 0.12) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(201, 149, 107, 0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(108, 92, 231, 0.08) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-0.5deg); }
            100% { transform: translate(1%, -1%) rotate(0.5deg); }
        }

        /* ===== FLOATING PARTICLES ===== */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--accent-gold);
            border-radius: 50%;
            opacity: 0;
            animation: float linear infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-duration: 18s; animation-delay: 0s; }
        .particle:nth-child(2) { left: 25%; animation-duration: 22s; animation-delay: 3s; }
        .particle:nth-child(3) { left: 40%; animation-duration: 16s; animation-delay: 6s; }
        .particle:nth-child(4) { left: 55%; animation-duration: 20s; animation-delay: 2s; }
        .particle:nth-child(5) { left: 70%; animation-duration: 24s; animation-delay: 5s; }
        .particle:nth-child(6) { left: 85%; animation-duration: 17s; animation-delay: 8s; }
        .particle:nth-child(7) { left: 15%; animation-duration: 21s; animation-delay: 4s; width: 2px; height: 2px; background: var(--accent-violet-light); }
        .particle:nth-child(8) { left: 60%; animation-duration: 19s; animation-delay: 7s; width: 2px; height: 2px; background: var(--accent-violet-light); }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* ===== MAIN CONTAINER ===== */
        .container {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 24px 80px;
        }

        /* ===== PROFILE HEADER ===== */
        .profile-header {
            text-align: center;
            margin-bottom: 48px;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== AVATAR ===== */
        .avatar-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 28px;
        }

        .avatar-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(
                var(--accent-gold),
                var(--accent-violet),
                var(--accent-gold-light),
                var(--accent-violet-light),
                var(--accent-gold)
            );
            animation: ringRotate 6s linear infinite;
            padding: 4px;
        }

        @keyframes ringRotate {
            to { transform: rotate(360deg); }
        }

        .avatar-ring::after {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            background: var(--bg-primary);
        }

        .avatar {
            position: relative;
            z-index: 2;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-violet));
            font-size: 3.2rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        /* ===== NAME & TITLE ===== */
        .profile-name {
            font-family: 'Playfair Display', serif;
            font-size: 2.6rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .profile-title {
            font-size: 1.05rem;
            color: var(--accent-gold);
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .profile-bio {
            max-width: 480px;
            margin: 0 auto;
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.7;
            font-weight: 300;
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 36px 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.15s forwards;
            opacity: 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-gold-light);
            display: block;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 4px;
        }

        /* ===== GLASS CARD ===== */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 32px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            margin-bottom: 24px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201, 149, 107, 0.3), transparent);
        }

        .glass-card:hover {
            background: var(--glass-hover);
            border-color: rgba(201, 149, 107, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 40px rgba(201, 149, 107, 0.05);
        }

        .card-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--accent-gold);
            margin-bottom: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--glass-border), transparent);
        }

        /* ===== INFO GRID ===== */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .info-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: default;
        }

        .info-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .info-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(201, 149, 107, 0.15), rgba(108, 92, 231, 0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 0.95rem;
            color: var(--text-primary);
            font-weight: 400;
        }

        /* ===== SOCIAL LINKS ===== */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 24px;
            border-radius: 14px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .social-link::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 14px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .social-link.github::before {
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
        }

        .social-link.telegram::before {
            background: linear-gradient(135deg, rgba(0, 136, 204, 0.15), rgba(0, 136, 204, 0.05));
        }

        .social-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(201, 149, 107, 0.3);
        }

        .social-link:hover::before {
            opacity: 1;
        }

        .social-icon {
            font-size: 1.3rem;
            position: relative;
            z-index: 1;
        }

        .social-text {
            position: relative;
            z-index: 1;
        }

        /* ===== EDIT BUTTON ===== */
        .edit-btn {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-violet));
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            box-shadow: 0 8px 32px rgba(201, 149, 107, 0.25);
        }

        .edit-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 40px rgba(201, 149, 107, 0.4);
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 999;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 560px;
            max-height: 85vh;
            overflow-y: auto;
            animation: modalSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes modalSlideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal::-webkit-scrollbar { width: 6px; }
        .modal::-webkit-scrollbar-track { background: transparent; }
        .modal::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 3px; }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 28px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 20px rgba(201, 149, 107, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border-radius: 12px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-save {
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-violet));
            color: white;
            box-shadow: 0 4px 20px rgba(201, 149, 107, 0.3);
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(201, 149, 107, 0.4);
        }

        .btn-cancel {
            background: var(--glass-bg);
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
        }

        .btn-cancel:hover {
            background: var(--glass-hover);
            color: var(--text-primary);
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text-secondary);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: var(--glass-hover);
            color: var(--text-primary);
        }

        /* ===== STAGGERED ANIMATIONS ===== */
        .animate-in {
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .container { padding: 40px 16px 100px; }
            .profile-name { font-size: 2rem; }
            .info-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .stats-bar { gap: 24px; }
            .social-links { flex-direction: column; align-items: center; }
            .glass-card { padding: 24px; }
            .modal { padding: 28px; }
        }

        /* ===== GLOWING LINE ===== */
        .glow-line {
            width: 60px;
            height: 3px;
            margin: 20px auto 0;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-violet));
            position: relative;
        }

        .glow-line::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-violet));
            filter: blur(10px);
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animated"></div>

    <!-- Floating Particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Main Content -->
    <div class="container">

        <!-- Profile Header -->
        <div class="profile-header">
            <div class="avatar-wrapper">
                <div class="avatar-ring"></div>
                <div class="avatar" th:if="${profile.avatarUrl == null or profile.avatarUrl.isEmpty()}">
                    <span th:text="${#strings.substring(profile.name, 0, 1)}">H</span>
                </div>
                <img class="avatar" th:if="${profile.avatarUrl != null and !profile.avatarUrl.isEmpty()}"
                     th:src="${profile.avatarUrl}" alt="Avatar">
            </div>
            <h1 class="profile-name" th:text="${profile.name}">Hoang Duong Binh</h1>
            <p class="profile-title" th:text="${profile.occupation}">Software Developer</p>
            <p class="profile-bio" th:text="${profile.bio}">Bio here</p>
            <div class="glow-line"></div>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-value" th:text="${profile.experience}">1 year</span>
                <span class="stat-label">Experience</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" th:text="${profile.education != null ? profile.education : 'N/A'}">University</span>
                <span class="stat-label">Education</span>
            </div>
        </div>

        <!-- Contact Info Card -->
        <div class="glass-card animate-in delay-2">
            <div class="card-title">Contact Information</div>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-icon">&#9993;</div>
                    <div>
                        <div class="info-label">Email</div>
                        <div class="info-value" th:text="${profile.email}">email@example.com</div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">&#9742;</div>
                    <div>
                        <div class="info-label">Phone</div>
                        <div class="info-value" th:text="${profile.phone}">0000000000</div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">&#9873;</div>
                    <div>
                        <div class="info-label">Location</div>
                        <div class="info-value" th:text="${profile.location}">Vietnam</div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">&#128188;</div>
                    <div>
                        <div class="info-label">Occupation</div>
                        <div class="info-value" th:text="${profile.occupation}">Developer</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Social Links Card -->
        <div class="glass-card animate-in delay-3">
            <div class="card-title">Connect</div>
            <div class="social-links">
                <a th:if="${profile.github != null and !profile.github.isEmpty()}"
                   th:href="${profile.github}" target="_blank" class="social-link github">
                    <span class="social-icon">&#128049;</span>
                    <span class="social-text">GitHub</span>
                </a>
                <a th:if="${profile.telegram != null and !profile.telegram.isEmpty()}"
                   th:href="${profile.telegram}" target="_blank" class="social-link telegram">
                    <span class="social-icon">&#9992;</span>
                    <span class="social-text">Telegram</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Edit Button -->
    <button class="edit-btn" onclick="openModal()" title="Edit Profile">&#9998;</button>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">&#10005;</button>
            <h2 class="modal-title">Edit Profile</h2>
            <form th:action="@{/profile/update}" method="post">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" th:value="${profile.name}" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" th:value="${profile.email}">
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" name="phone" th:value="${profile.phone}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Occupation</label>
                        <input type="text" name="occupation" th:value="${profile.occupation}">
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" name="location" th:value="${profile.location}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Experience</label>
                        <input type="text" name="experience" th:value="${profile.experience}">
                    </div>
                    <div class="form-group">
                        <label>Education</label>
                        <input type="text" name="education" th:value="${profile.education}">
                    </div>
                </div>
                <div class="form-group">
                    <label>Bio</label>
                    <textarea name="bio" th:text="${profile.bio}"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>GitHub URL</label>
                        <input type="url" name="github" th:value="${profile.github}">
                    </div>
                    <div class="form-group">
                        <label>Telegram URL</label>
                        <input type="url" name="telegram" th:value="${profile.telegram}">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-save">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openModal() {
            document.getElementById('editModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
            document.body.style.overflow = '';
        }
        // Close modal on overlay click
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        // Close on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
